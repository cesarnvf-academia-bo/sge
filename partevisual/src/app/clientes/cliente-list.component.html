<div class="container mx-auto p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold text-gray-800">Clientes</h1>
    <button (click)="navigateToCreate()" class="p-2 bg-blue-500 hover:bg-blue-600 text-white rounded" title="Nuevo Cliente">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full border border-gray-200 rounded-lg shadow-md">
      <thead class="bg-gray-100">
        <tr>
          <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700 border-b">ID</th>
          <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700 border-b">Nombre</th>
          <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700 border-b">CI</th>
          <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700 border-b">Teléfono</th>
          <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700 border-b">Email</th>
          <th class="py-3 px-4 text-center text-sm font-semibold text-gray-700 border-b">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (cliente of clientes(); track cliente.id) {
        <tr class="hover:bg-gray-50 border-b last:border-b-0">
          <td class="py-3 px-4 text-sm text-gray-600">{{ cliente.id }}</td>
          <td class="py-3 px-4 text-sm text-gray-600">{{ cliente.nombre }} {{ cliente.apellido }}</td>
          <td class="py-3 px-4 text-sm text-gray-600">{{ cliente.ci || '-' }}</td>
          <td class="py-3 px-4 text-sm text-gray-600">{{ cliente.telefono || '-' }}</td>
          <td class="py-3 px-4 text-sm text-gray-600">{{ cliente.email || '-' }}</td>
          <td class="py-3 px-4 text-center">
            <button (click)="navigateToEdit(cliente.id!)" class="p-2 text-yellow-600 hover:bg-yellow-50 rounded" title="Editar">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </button>
            <button (click)="deleteCliente(cliente.id!)" class="p-2 text-red-600 hover:bg-red-50 rounded ml-1" title="Eliminar">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1H6a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </td>
        </tr>
        } @empty {
        <tr>
          <td colspan="6" class="py-4 px-4 text-center text-gray-500">No hay clientes registrados</td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
