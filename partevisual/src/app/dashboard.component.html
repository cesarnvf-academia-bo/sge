<div class="flex h-screen">
  <!-- Barra lateral -->
  <aside
    [class]="sidebarVisible() ? 'w-20' : 'w-0'"
    class="bg-gray-800 text-white transition-all duration-300 overflow-hidden"
  >
    <div class="w-20 p-4 flex flex-col items-center">
      <h2 class="text-xs font-bold mb-6 text-center">MENÚ</h2>
      <nav class="flex flex-col gap-4 w-full">
        <a
          routerLink="/dashboard/clientes"
          routerLinkActive="bg-gray-700"
          class="flex flex-col items-center py-2 px-2 rounded hover:bg-gray-700 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span class="text-xs mt-1">Clientes</span>
        </a>
        <a
          routerLink="/dashboard/sucursales"
          routerLinkActive="bg-gray-700"
          class="flex flex-col items-center py-2 px-2 rounded hover:bg-gray-700 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 3v6m0-6v6" />
          </svg>
          <span class="text-xs mt-1">Sucursales</span>
        </a>
      </nav>
    </div>
  </aside>

  <!-- Contenido principal -->
  <div class="flex-1 flex flex-col">
    <!-- Barra superior -->
    <header class="bg-white shadow px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button
          (click)="toggleSidebar()"
          class="p-2 rounded hover:bg-gray-100 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <span class="text-sm text-gray-600 font-medium">Sistema de Gestión Empresarial</span>
      </div>
      <div class="flex items-center gap-2">
        <button
          (click)="toggleFullscreen()"
          class="p-2 rounded hover:bg-gray-100 transition-colors"
          title="Pantalla completa"
        >
          <svg *ngIf="!isFullscreen()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5 5m11 1l-5 5m0 0h4m-4 0l5 5" />
          </svg>
          <svg *ngIf="isFullscreen()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4m0 0H4m5 0l5 5m0 0v5m0 5h5m0 0v5m0-5h-5m0 0H9m5-5l-5 5m0 0H9m5 0V9" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Contenido -->
    <main class="flex-1 p-4 bg-gray-50 overflow-auto">
      <router-outlet />
    </main>
  </div>
</div>
